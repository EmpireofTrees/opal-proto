<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>EXP-003 · plane-cutter opal carve</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0a0b0e; color: #cfd2d8;
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  .top { position: fixed; top: 0; left: 0; right: 0; padding: 9px 12px; display: flex; gap: 10px; align-items: center;
    justify-content: space-between; background: linear-gradient(rgba(0,0,0,0.55), transparent); pointer-events: none; }
  .top b { font-weight: 600; } .top .sub { color: #7d818b; font-size: 11px; }
  .hud { position: fixed; left: 0; right: 0; bottom: 0; padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,0.7)); display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { background: #1b1e24; color: #cfd2d8; border: 1px solid #30343c; border-radius: 8px; padding: 9px 13px; font-size: 13px; pointer-events: auto; }
  button.on { background: #2f4a3a; border-color: #3f6b50; color: #b6f0c8; }
  .score { display: flex; gap: 14px; font-size: 12px; color: #9aa; flex-wrap: wrap; pointer-events: none; }
  .score b { color: #e6e8ec; font-variant-numeric: tabular-nums; }
  .score .opal { color: #c9a6ff; } .score .waste { color: #e69090; }
  /* vertical feed slider on the right */
  .feed { position: fixed; right: 4px; top: 50%; transform: translateY(-50%); height: 260px; width: 54px;
    display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .feed input { width: 230px; transform: rotate(-90deg); pointer-events: auto; accent-color: #8fb6ff; }
  .feedlbl { position: fixed; right: 6px; top: calc(50% + 145px); transform: translateY(-50%); font-size: 10px; color: #7d818b; text-align: center; width: 50px; }
  .feedtop { position: fixed; right: 6px; top: calc(50% - 145px); transform: translateY(-50%); font-size: 14px; color: #9aa; text-align: center; width: 50px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="top"><b>EXP-003 — plane-cutter carve · <span class="sub">build 20260619-113734</span></b><span class="sub" id="hint">drag to rotate · slider feeds the stone into the wheel</span></div>

<div class="feedtop">⊙ wheel</div>
<div class="feed"><input id="feed" type="range" min="0" max="24" step="0.25" value="0" /></div>
<div class="feedlbl">▲ feed<br>up = cut</div>

<div class="hud">
  <div class="score">
    <span>exposed opal <b class="opal" id="sOpal">0</b></span>
    <span>avg color <b id="sColor">0</b></span>
    <span>destroyed <b class="waste" id="sWaste">0</b></span>
    <span>value <b id="sVal">0</b></span>
  </div>
  <div class="row">
    <button id="xray">👁 X-ray opal</button>
    <button id="replay">↺ Replay (reset cuts)</button>
    <button id="newStone">＋ New rough</button>
  </div>
</div>

<script src="gen.js"></script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const G = globalThis.OpalGen;
const N = 22;

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0b0e);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);

scene.add(new THREE.HemisphereLight(0xbfc6d6, 0x202028, 1.0));
const dirL = new THREE.DirectionalLight(0xffffff, 1.3); dirL.position.set(1, 1.6, 1.2); scene.add(dirL);
const dirL2 = new THREE.DirectionalLight(0x8090c0, 0.5); dirL2.position.set(-1, -0.4, -1); scene.add(dirL2);

const center = (N - 1) / 2;
const R = N * 0.40;
const planeY = R + 3;             // the cutting plane / wheel height (clears the stone at feed 0)
const lookY = planeY * 0.42;

// the grinding wheel (a flat disc at planeY)
const wheel = new THREE.Mesh(
  new THREE.CylinderGeometry(R + 4, R + 4, 0.5, 56),
  new THREE.MeshStandardMaterial({ color: 0x3a3d44, metalness: 0.6, roughness: 0.5, transparent: true, opacity: 0.55 })
);
wheel.position.y = planeY; scene.add(wheel);
const wheelRim = new THREE.Mesh(
  new THREE.TorusGeometry(R + 4, 0.18, 8, 56),
  new THREE.MeshStandardMaterial({ color: 0x9aa0ad, metalness: 0.8, roughness: 0.3 })
);
wheelRim.position.y = planeY; wheelRim.rotation.x = Math.PI / 2; scene.add(wheelRim);

const group = new THREE.Group(); scene.add(group);
const geo = new THREE.BoxGeometry(1, 1, 1);
const mat = new THREE.MeshLambertMaterial();
let mesh = null, surfaceIndex = [], destroyed = 0, xrayOn = false, feed = 0;
let vol, origMat, origQual;
const dummy = new THREE.Object3D();
const col = new THREE.Color();

function colorFor(m, q) {
  if (m === G.SKIN) return col.setHSL(0.09, 0.35, 0.34);
  if (m === G.OPAL) return col.setHSL((0.5 + q * 0.55) % 1, 0.55 + 0.4 * q, 0.30 + 0.40 * q);
  if (m === G.POTCH) return col.setRGB(0.17, 0.17, 0.20);
  return col.setRGB(0.14, 0.11, 0.08);
}

function loadVolume(seed) {
  vol = G.generateVolume(seed, N);
  origMat = vol.mat.slice(); origQual = vol.qual.slice();
  destroyed = 0; feed = 0;
  document.getElementById('feed').value = 0;
  group.position.y = 0; group.rotation.set(-0.3, 0.5, 0);
  rebuild();
}
function replay() {
  vol.mat.set(origMat); vol.qual.set(origQual);
  destroyed = 0; feed = 0; document.getElementById('feed').value = 0;
  group.position.y = 0; rebuild();
}

function rebuild() {
  const draw = [];
  for (let z = 0; z < N; z++) for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    const idx = x + N * (y + N * z);
    const m = vol.mat[idx];
    if (m === G.EMPTY) continue;
    if (xrayOn) { if (m === G.OPAL) draw.push([idx, x, y, z, m]); }   // x-ray: only the seam
    else if (G.isSurface(vol, x, y, z)) draw.push([idx, x, y, z, m]);
  }
  if (!mesh || mesh.userData.max < draw.length) {
    if (mesh) { group.remove(mesh); mesh.dispose(); }
    const max = Math.max(draw.length, 4000);
    mesh = new THREE.InstancedMesh(geo, mat, max);
    mesh.userData.max = max; mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    group.add(mesh);
  }
  surfaceIndex = [];
  let i = 0, opalCount = 0, sumQ = 0;
  for (const [idx, x, y, z, m] of draw) {
    dummy.position.set(x - center, y - center, z - center); dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    mesh.setColorAt(i, colorFor(m, vol.qual[idx]));
    surfaceIndex[i] = idx;
    if (m === G.OPAL) { opalCount++; sumQ += vol.qual[idx]; }
    i++;
  }
  mesh.count = i;
  mesh.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  updateScore(opalCount, sumQ);
}

function updateScore(opalCount, sumQ) {
  const avgQ = opalCount ? sumQ / opalCount : 0;
  const value = Math.max(0, Math.round(opalCount * (0.4 + 0.6 * avgQ) * 4 - destroyed * 8));
  document.getElementById('sOpal').textContent = xrayOn ? '(x-ray)' : opalCount;
  document.getElementById('sColor').textContent = Math.round(avgQ * 100);
  document.getElementById('sWaste').textContent = destroyed;
  document.getElementById('sVal').textContent = xrayOn ? '—' : value;
}

// ---- the cut: remove any voxel pushed above the wheel plane ----
const _v = new THREE.Vector3();
function grind() {
  if (xrayOn) return;
  const q = group.quaternion;
  let changed = false;
  for (let idx = 0; idx < vol.mat.length; idx++) {
    const m = vol.mat[idx]; if (m === G.EMPTY) continue;
    const x = idx % N, y = Math.floor(idx / N) % N, z = Math.floor(idx / (N * N));
    _v.set(x - center, y - center, z - center).applyQuaternion(q);
    if (_v.y + feed > planeY) {       // above the plane → ground away
      if (m === G.OPAL) destroyed++;
      vol.mat[idx] = G.EMPTY; changed = true;
    }
  }
  if (changed) rebuild();
}

// ---- input: drag = rotate, slider = feed ----
let pdown = false, last = null;
canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId); pdown = true; last = [e.clientX, e.clientY];
});
canvas.addEventListener('pointermove', e => {
  if (!pdown) return;
  const dx = e.clientX - last[0], dy = e.clientY - last[1]; last = [e.clientX, e.clientY];
  group.rotation.y += dx * 0.01;
  group.rotation.x = Math.max(-1.5, Math.min(1.5, group.rotation.x + dy * 0.01));
  grind(); // rotating while fed into the wheel keeps grinding (lets you dome/shape)
});
function endP(e) { pdown = false; }
canvas.addEventListener('pointerup', endP);
canvas.addEventListener('pointercancel', endP);

const feedEl = document.getElementById('feed');
feedEl.addEventListener('input', e => {
  feed = +e.target.value; group.position.y = feed; grind();
});
// pinch / wheel zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  camera.position.z = Math.max(R * 2, Math.min(R * 12, camera.position.z * (1 + Math.sign(e.deltaY) * 0.1)));
}, { passive: false });

document.getElementById('xray').onclick = e => { xrayOn = !xrayOn; e.target.classList.toggle('on', xrayOn); rebuild(); };
document.getElementById('replay').onclick = replay;
document.getElementById('newStone').onclick = () => loadVolume('rock-' + Math.random().toString(36).slice(2, 9));

function fitCamera() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
  const fov = camera.fov * Math.PI / 180;
  const fit = R + 6;
  const vDist = fit / Math.sin(fov / 2);
  const hFov = 2 * Math.atan(Math.tan(fov / 2) * camera.aspect);
  const hDist = fit / Math.sin(hFov / 2);
  camera.position.set(0, lookY, Math.max(vDist, hDist) * 1.05);
  camera.lookAt(0, lookY, 0);
}
addEventListener('resize', fitCamera);
loadVolume('rock-' + Math.random().toString(36).slice(2, 9));
fitCamera();

(function animate() {
  requestAnimationFrame(animate);
  wheel.rotation.y += 0.05; wheelRim.rotation.z += 0.05; // spin the wheel
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
