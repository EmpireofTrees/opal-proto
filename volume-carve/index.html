<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>EXP-003 · plane-cutter opal carve</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0a0b0e; color: #cfd2d8;
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
  .top { position: fixed; top: 0; left: 0; right: 0; padding: 9px 12px; display: flex; gap: 10px; align-items: center;
    justify-content: space-between; background: linear-gradient(rgba(0,0,0,0.55), transparent); pointer-events: none; }
  .top b { font-weight: 600; } .top .sub { color: #7d818b; font-size: 11px; }
  .hud { position: fixed; left: 0; right: 0; bottom: 0; padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, rgba(0,0,0,0.7)); display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  button { background: #1b1e24; color: #cfd2d8; border: 1px solid #30343c; border-radius: 8px; padding: 9px 13px; font-size: 13px; pointer-events: auto; }
  button.on { background: #2f4a3a; border-color: #3f6b50; color: #b6f0c8; }
  .score { display: flex; gap: 14px; font-size: 12px; color: #9aa; flex-wrap: wrap; pointer-events: none; }
  .score b { color: #e6e8ec; font-variant-numeric: tabular-nums; }
  .score .opal { color: #c9a6ff; } .score .waste { color: #e69090; }

  /* big custom physics feed control on the right */
  #feedctl { position: fixed; right: 10px; top: 50%; transform: translateY(-50%);
    width: 78px; height: 60vh; max-height: 460px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #feedtrack { position: relative; flex: 1; width: 64px; border-radius: 36px; touch-action: none;
    background: #15171c; border: 1px solid #2a2d35; overflow: hidden; box-shadow: inset 0 0 16px rgba(0,0,0,0.5); }
  #feedfill { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(#7fa8ff, #3d63c8); opacity: 0.5; }
  #feedthumb { position: absolute; left: 5px; right: 5px; height: 54px; border-radius: 28px; bottom: 0;
    background: radial-gradient(circle at 50% 38%, #d8e2ff, #6f86c8); border: 1px solid #aab8e0; transform: translateY(50%);
    box-shadow: 0 3px 10px rgba(0,0,0,0.5); }
  #feedctl .cap { font-size: 11px; color: #9aa; text-align: center; line-height: 1.25; }
  #feedctl .cap b { color: #cfd2d8; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="top"><b>EXP-003 — plane-cutter carve · <span class="sub">build 20260619-213616</span></b><span class="sub" id="hint">1 finger = rotate · 2 fingers = pinch-zoom + twist-roll · pad = grind</span></div>

<div id="feedctl">
  <div class="cap"><b>PRESS ▲</b></div>
  <div id="feedtrack"><div id="feedfill"></div><div id="feedthumb"></div></div>
  <div class="cap">into wheel</div>
</div>

<div class="hud">
  <div class="score">
    <span>exposed opal <b class="opal" id="sOpal">0</b></span>
    <span>avg color <b id="sColor">0</b></span>
    <span>destroyed <b class="waste" id="sWaste">0</b></span>
    <span>value <b id="sVal">0</b></span>
  </div>
  <div class="row">
    <button id="xray">👁 X-ray opal</button>
    <button id="replay">↺ Replay</button>
    <button id="newStone">＋ New rough</button>
  </div>
</div>

<script src="gen.js"></script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
const G = globalThis.OpalGen;
const N = 22;

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio || 1));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0b0e);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);

scene.add(new THREE.HemisphereLight(0xbfc6d6, 0x202028, 1.0));
const dirL = new THREE.DirectionalLight(0xffffff, 1.3); dirL.position.set(1, 1.6, 1.2); scene.add(dirL);
const dirL2 = new THREE.DirectionalLight(0x8090c0, 0.5); dirL2.position.set(-1, -0.4, -1); scene.add(dirL2);

const center = (N - 1) / 2;
const R = N * 0.40;
const planeY = R + 3;            // cutting plane height
const lookY = planeY * 0.40;
const MAXFEED = 26, MAXRATE = 10, PREF = 4; // feed physics constants

// grinding wheel
const wheel = new THREE.Mesh(
  new THREE.CylinderGeometry(R + 4, R + 4, 0.5, 56),
  new THREE.MeshStandardMaterial({ color: 0x3a3d44, metalness: 0.6, roughness: 0.5, transparent: true, opacity: 0.5 }));
wheel.position.y = planeY; scene.add(wheel);
const wheelRim = new THREE.Mesh(
  new THREE.TorusGeometry(R + 4, 0.18, 8, 56),
  new THREE.MeshStandardMaterial({ color: 0x9aa0ad, metalness: 0.8, roughness: 0.3 }));
wheelRim.position.y = planeY; wheelRim.rotation.x = Math.PI / 2; scene.add(wheelRim);

const group = new THREE.Group(); scene.add(group);
const geo = new THREE.BoxGeometry(1, 1, 1);
const mat = new THREE.MeshLambertMaterial();
let mesh = null, surfaceIndex = [], destroyed = 0, xrayOn = false;
let vol, origMat, origQual;
const pivotLocal = new THREE.Vector3();   // center of mass of remaining piece (local coords)
const dummy = new THREE.Object3D(); const col = new THREE.Color();
let cmd = 0, feed = 0, sliderActive = false, pendingRecenter = false;

function colorFor(m, q) {
  if (m === G.SKIN) return col.setHSL(0.09, 0.35, 0.34);
  if (m === G.OPAL) return col.setHSL((0.5 + q * 0.55) % 1, 0.55 + 0.4 * q, 0.30 + 0.40 * q);
  if (m === G.POTCH) return col.setRGB(0.17, 0.17, 0.20);
  return col.setRGB(0.14, 0.11, 0.08);
}

function loadVolume(seed) {
  vol = G.generateVolume(seed, N);
  origMat = vol.mat.slice(); origQual = vol.qual.slice();
  destroyed = 0; cmd = 0; feed = 0; group.position.y = 0;
  group.quaternion.setFromEuler(new THREE.Euler(-0.3, 0.5, 0));
  rebuild(); recenter();
}
function replay() {
  vol.mat.set(origMat); vol.qual.set(origQual);
  destroyed = 0; cmd = 0; feed = 0; group.position.y = 0;
  rebuild(); recenter();
}

function recenter() {
  let cx = 0, cy = 0, cz = 0, n = 0;
  for (let idx = 0; idx < vol.mat.length; idx++) {
    if (vol.mat[idx] === G.EMPTY) continue;
    const x = idx % N, y = Math.floor(idx / N) % N, z = Math.floor(idx / (N * N));
    cx += x - center; cy += y - center; cz += z - center; n++;
  }
  if (n) pivotLocal.set(cx / n, cy / n, cz / n);
  if (mesh) mesh.position.copy(pivotLocal).multiplyScalar(-1);
}

function rebuild() {
  const draw = [];
  for (let z = 0; z < N; z++) for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    const idx = x + N * (y + N * z);
    const m = vol.mat[idx];
    if (m === G.EMPTY) continue;
    if (xrayOn) { if (m === G.OPAL) draw.push([idx, x, y, z, m]); }
    else if (G.isSurface(vol, x, y, z)) draw.push([idx, x, y, z, m]);
  }
  if (!mesh || mesh.userData.max < draw.length) {
    if (mesh) { group.remove(mesh); mesh.dispose(); }
    const max = Math.max(draw.length, 4000);
    mesh = new THREE.InstancedMesh(geo, mat, max);
    mesh.userData.max = max; mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    group.add(mesh);
  }
  surfaceIndex = [];
  let i = 0, opalCount = 0, sumQ = 0;
  for (const [idx, x, y, z, m] of draw) {
    dummy.position.set(x - center, y - center, z - center); dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
    mesh.setColorAt(i, colorFor(m, vol.qual[idx]));
    surfaceIndex[i] = idx;
    if (m === G.OPAL) { opalCount++; sumQ += vol.qual[idx]; }
    i++;
  }
  mesh.count = i;
  mesh.position.copy(pivotLocal).multiplyScalar(-1);
  mesh.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  updateScore(opalCount, sumQ);
}

function updateScore(opalCount, sumQ) {
  const avgQ = opalCount ? sumQ / opalCount : 0;
  const value = Math.max(0, Math.round(opalCount * (0.4 + 0.6 * avgQ) * 4 - destroyed * 8));
  document.getElementById('sOpal').textContent = xrayOn ? '(x-ray)' : opalCount;
  document.getElementById('sColor').textContent = Math.round(avgQ * 100);
  document.getElementById('sWaste').textContent = destroyed;
  document.getElementById('sVal').textContent = xrayOn ? '—' : value;
}

// remove any voxel pushed above the wheel plane (uses center-of-mass pivot + feed)
const _v = new THREE.Vector3();
function grind() {
  if (xrayOn) return false;
  const q = group.quaternion;
  let changed = false;
  for (let idx = 0; idx < vol.mat.length; idx++) {
    const m = vol.mat[idx]; if (m === G.EMPTY) continue;
    const x = idx % N, y = Math.floor(idx / N) % N, z = Math.floor(idx / (N * N));
    _v.set(x - center - pivotLocal.x, y - center - pivotLocal.y, z - center - pivotLocal.z).applyQuaternion(q);
    if (_v.y + feed > planeY) {
      if (m === G.OPAL) destroyed++;
      vol.mat[idx] = G.EMPTY; changed = true;
    }
  }
  if (changed) rebuild();
  return changed;
}

// ---- trackball rotation: infinite, no clamp ----
const _qd = new THREE.Quaternion(), _ax = new THREE.Vector3();
function rotateBy(dx, dy) {
  _qd.setFromAxisAngle(_ax.set(0, 1, 0), dx * 0.01); group.quaternion.premultiply(_qd);
  _qd.setFromAxisAngle(_ax.set(1, 0, 0), dy * 0.01); group.quaternion.premultiply(_qd);
}
const _fwd = new THREE.Vector3();
function rollBy(dA) { camera.getWorldDirection(_fwd); _qd.setFromAxisAngle(_fwd, dA); group.quaternion.premultiply(_qd); }
function zoomBy(scale) { camera.position.z = Math.max(R * 2, Math.min(R * 12, camera.position.z * scale)); }

// multitouch: 1 finger = rotate (yaw/pitch), 2 fingers = pinch-zoom + twist-roll
const ptrs = new Map();
let rotLast = null, lastDist = 0, lastAng = 0, startDist = 0, startAng = 0, twoMode = null;
function twoMetrics() {
  const a = [...ptrs.values()];
  const dx = a[1].x - a[0].x, dy = a[1].y - a[0].y;
  return { dist: Math.hypot(dx, dy) || 1, ang: Math.atan2(dy, dx) };
}
function initTwo() { const m = twoMetrics(); startDist = lastDist = m.dist; startAng = lastAng = m.ang; twoMode = null; }
canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 1) rotLast = [e.clientX, e.clientY];
  else if (ptrs.size === 2) initTwo();
});
canvas.addEventListener('pointermove', e => {
  if (!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 1) {
    const dx = e.clientX - rotLast[0], dy = e.clientY - rotLast[1]; rotLast = [e.clientX, e.clientY];
    rotateBy(dx, dy);
  } else if (ptrs.size >= 2) {
    const m = twoMetrics();
    let dA = m.ang - lastAng; if (dA > Math.PI) dA -= 2 * Math.PI; if (dA < -Math.PI) dA += 2 * Math.PI;
    if (!twoMode) {                                  // lock the gesture to ONE action (zoom xor roll)
      const zoomScore = Math.abs(m.dist / startDist - 1);
      let tA = m.ang - startAng; if (tA > Math.PI) tA -= 2 * Math.PI; if (tA < -Math.PI) tA += 2 * Math.PI;
      if (zoomScore > 0.06 || Math.abs(tA) > 0.10) twoMode = (zoomScore * 1.4 >= Math.abs(tA)) ? 'zoom' : 'roll';
    }
    if (twoMode === 'zoom') zoomBy(lastDist / m.dist);
    else if (twoMode === 'roll') rollBy(dA);
    lastDist = m.dist; lastAng = m.ang;
  }
});
function endPtr(e) {
  ptrs.delete(e.pointerId);
  if (ptrs.size === 1) { const a = [...ptrs.values()][0]; rotLast = [a.x, a.y]; }
  else if (ptrs.size === 2) initTwo();
}
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);
canvas.addEventListener('wheel', e => { e.preventDefault(); zoomBy(1 + Math.sign(e.deltaY) * 0.1); }, { passive: false });

// ---- physics feed pad ----
const track = document.getElementById('feedtrack');
const fill = document.getElementById('feedfill');
const thumb = document.getElementById('feedthumb');
function setCmdFromY(clientY) {
  const r = track.getBoundingClientRect();
  const frac = Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height));
  cmd = frac * MAXFEED;
}
track.addEventListener('pointerdown', e => { track.setPointerCapture(e.pointerId); sliderActive = true; setCmdFromY(e.clientY); });
track.addEventListener('pointermove', e => { if (sliderActive) setCmdFromY(e.clientY); });
function releaseFeed() { if (sliderActive) { sliderActive = false; cmd = feed; pendingRecenter = true; } }
track.addEventListener('pointerup', releaseFeed);
track.addEventListener('pointercancel', releaseFeed);

document.getElementById('xray').onclick = e => { xrayOn = !xrayOn; e.target.classList.toggle('on', xrayOn); rebuild(); };
document.getElementById('replay').onclick = replay;
document.getElementById('newStone').onclick = () => loadVolume('rock-' + Math.random().toString(36).slice(2, 9));

// ---- physics tick ----
function tick(dt) {
  if (!sliderActive) { cmd += (0 - cmd) * Math.min(1, dt * 9); if (cmd < 0.05) cmd = 0; } // spring back
  if (cmd > feed) {                                  // pressing in → grind incrementally
    const pressure = cmd - feed;
    const rate = MAXRATE * Math.max(0.18, Math.min(1, pressure / PREF));
    feed = Math.min(cmd, feed + rate * dt);
    group.position.y = feed;
    if (!xrayOn) grind();
  } else if (feed > cmd) {                           // pulling back is free (stone retreats)
    feed = cmd; group.position.y = feed;
  }
  if (pendingRecenter && !sliderActive && feed < 0.06 && cmd < 0.06) { recenter(); pendingRecenter = false; }
  // pad visuals
  fill.style.height = (feed / MAXFEED * 100) + '%';
  thumb.style.bottom = (cmd / MAXFEED * 100) + '%';
}

function fitCamera() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
  const fov = camera.fov * Math.PI / 180, fit = R + 6;
  const vDist = fit / Math.sin(fov / 2);
  const hFov = 2 * Math.atan(Math.tan(fov / 2) * camera.aspect);
  const hDist = fit / Math.sin(hFov / 2);
  camera.position.set(0, lookY, Math.max(vDist, hDist) * 1.05);
  camera.lookAt(0, lookY, 0);
}
addEventListener('resize', fitCamera);
loadVolume('rock-' + Math.random().toString(36).slice(2, 9));
fitCamera();

let prev = performance.now();
(function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, (now - prev) / 1000); prev = now;
  tick(dt);
  wheel.rotation.y += 0.05; wheelRim.rotation.z += 0.05;
  renderer.render(scene, camera);
})(prev);
</script>
</body>
</html>
