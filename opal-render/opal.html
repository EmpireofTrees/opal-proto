<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Opal — interactive play-of-color (iter8 model)</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0a0a0c; color:#cfd2da;
    font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; }
  canvas { width:100%; height:100%; display:block; touch-action:none; cursor:grab; }
  canvas:active { cursor:grabbing; }
  #ui { position:fixed; top:10px; left:10px; background:rgba(14,14,18,.82);
    border:1px solid #23262e; border-radius:10px; padding:11px 13px; width:228px;
    backdrop-filter:blur(6px); user-select:none; }
  #ui h1 { font-size:12px; margin:0 0 8px; letter-spacing:.04em; color:#8fb6ff; text-transform:uppercase; }
  .row { display:flex; align-items:center; justify-content:space-between; margin:7px 0; gap:8px; }
  .row label { color:#9aa0ac; }
  .row .val { color:#e6e9f0; font-variant-numeric:tabular-nums; min-width:46px; text-align:right; }
  input[type=range] { width:100%; accent-color:#6f9bff; }
  .presets { display:flex; gap:6px; margin:8px 0 4px; }
  .presets button, .tog { flex:1; background:#1b1e26; border:1px solid #2b2f3a; color:#cfd2da;
    border-radius:7px; padding:6px 4px; font-size:11px; cursor:pointer; }
  .presets button:hover, .tog:hover { background:#252935; }
  .tog.on { background:#2c3c63; border-color:#3f5da0; color:#dce6ff; }
  #hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
    color:#6b7280; font-size:12px; background:rgba(14,14,18,.6); padding:5px 12px; border-radius:8px; }
  #err { position:fixed; inset:auto 10px 10px 10px; max-height:40%; overflow:auto;
    background:#2a1316; border:1px solid #6b2630; color:#ffb4ba; padding:10px; border-radius:8px;
    font:11px/1.4 ui-monospace,Menlo,monospace; white-space:pre-wrap; display:none; }
  #fps { position:fixed; top:10px; right:12px; color:#5a6172; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="ui">
  <h1>Opal · play-of-color</h1>
  <button id="newstone" class="tog on" style="width:100%;margin-bottom:6px;padding:8px;font-size:12px">🎲 New stone</button>
  <div id="identity" style="font-size:11px;color:#9fb4e0;margin-bottom:10px;min-height:14px">drag to rotate · roll a stone above</div>
  <div class="row"><label>Body tone</label><span class="val" id="vBody">black</span></div>
  <input type="range" id="body" min="0.0" max="0.9" step="0.02" value="0.05">
  <div class="row"><label>Brightness</label><span class="val" id="vBright">1.00×</span></div>
  <input type="range" id="bright" min="0.4" max="1.5" step="0.05" value="1.0">
  <div class="presets">
    <button data-hue="445" data-spread="26">Indigo</button>
    <button data-hue="475" data-spread="26">Blue</button>
    <button data-hue="520" data-spread="26">Green</button>
    <button data-hue="600" data-spread="26">Red</button>
  </div>
  <div class="row"><label>Hue center</label><span class="val" id="vHue">445 nm</span></div>
  <input type="range" id="hue" min="415" max="675" step="1" value="445">
  <div class="row"><label>Hue spread</label><span class="val" id="vSpread">26 nm</span></div>
  <input type="range" id="spread" min="14" max="220" step="2" value="26">
  <div class="row"><label>Flake size</label><span class="val" id="vSize">1.40×</span></div>
  <input type="range" id="size" min="0.4" max="2.6" step="0.05" value="1.4">
  <div class="row"><label>Density (count)</label><span class="val" id="vDens">60%</span></div>
  <input type="range" id="dens" min="0.15" max="1.0" step="0.05" value="0.6">
  <div class="row"><label>Pop sharpness</label><span class="val" id="vPop">0.07</span></div>
  <input type="range" id="pop" min="0.03" max="0.22" step="0.005" value="0.07">
  <div class="row"><label>Matrix skin</label><span class="val" id="vSkin">off</span></div>
  <input type="range" id="skin" min="0.0" max="1.0" step="0.05" value="0.0">
  <div class="row"><label>Quality</label><span class="val" id="vQual">1.0×</span></div>
  <input type="range" id="qual" min="0.5" max="1.6" step="0.1" value="1.0">
  <div class="presets" style="margin-top:9px">
    <button class="tog" id="spin">Auto-spin</button>
    <button class="tog" id="reset">Reset view</button>
  </div>
</div>
<div id="fps"></div>
<div id="hint">drag to rotate · pinch/scroll to zoom</div>
<div id="err"></div>

<script type="text/javascript">
const FRAG = `#version 300 es
precision highp float;
precision highp int;
out vec4 outColor;
uniform vec2  uRes;
uniform float uYaw, uPitch, uDist;
uniform float uHueCenter, uHueSpread, uSize, uDensity, uPop, uSkin;
uniform float uBody, uBright, uHue2, uHue2Mix;

const vec3 LIGHT = vec3(0.6246, 0.6246, 0.4690); // normalize(0.45,0.72,0.50)-ish, fixed in world

// ---------- hashing ----------
uint hashU(uint x){ x^=x>>16; x*=0x7feb352du; x^=x>>15; x*=0x846ca68bu; x^=x>>16; return x; }
uint hash3(ivec3 c, uint seed){
  uint h = seed*0x9E3779B1u;
  h ^= hashU(uint(c.x)*0x85ebca6bu);
  h ^= hashU(uint(c.y)*0xc2b2ae35u);
  h ^= hashU(uint(c.z)*0x27d4eb2fu);
  return hashU(h);
}
float u2unit(uint h){ return float(h & 0x00FFFFFFu)/16777216.0; }
float cellUnit(uint id){ return u2unit(hashU(id ^ 0x9e3779b9u)); }
vec3 cellAxis(uint id){
  float a = u2unit(id)*6.28318530718;
  float z = u2unit(hashU(id))*2.0-1.0;
  float r = sqrt(max(0.0,1.0-z*z));
  return vec3(r*cos(a), r*sin(a), z);
}
vec3 cellJitter(uint h){ return vec3(u2unit(h), u2unit(hashU(h)), u2unit(hashU(hashU(h)))); }

struct V2 { uint id; float f1; float f2; };
V2 voronoi2(vec3 p, uint seed){
  vec3 pf = floor(p);
  float f1=1e9, f2=1e9; uint id=0u;
  for(int dz=-1;dz<=1;dz++)
  for(int dy=-1;dy<=1;dy++)
  for(int dx=-1;dx<=1;dx++){
    ivec3 c = ivec3(pf) + ivec3(dx,dy,dz);
    uint h = hash3(c, seed);
    vec3 fp = vec3(c) + cellJitter(h);
    float d = length(fp - p);
    if(d<f1){ f2=f1; f1=d; id=h; } else if(d<f2){ f2=d; }
  }
  return V2(id,f1,f2);
}

// ---------- value noise / fbm ----------
float vh(ivec3 c, uint seed){ return u2unit(hash3(c,seed)); }
float vnoise(vec3 p, uint seed){
  vec3 i=floor(p), f=fract(p); vec3 u=f*f*(3.0-2.0*f); ivec3 b=ivec3(i);
  float n000=vh(b+ivec3(0,0,0),seed), n100=vh(b+ivec3(1,0,0),seed);
  float n010=vh(b+ivec3(0,1,0),seed), n110=vh(b+ivec3(1,1,0),seed);
  float n001=vh(b+ivec3(0,0,1),seed), n101=vh(b+ivec3(1,0,1),seed);
  float n011=vh(b+ivec3(0,1,1),seed), n111=vh(b+ivec3(1,1,1),seed);
  float x00=mix(n000,n100,u.x), x10=mix(n010,n110,u.x);
  float x01=mix(n001,n101,u.x), x11=mix(n011,n111,u.x);
  return mix(mix(x00,x10,u.y), mix(x01,x11,u.y), u.z);
}
float fbm(vec3 p, int oct, uint seed){
  float a=0.5, s=0.0;
  for(int i=0;i<6;i++){ if(i>=oct) break; s += a*vnoise(p, seed+uint(i)*131u); p*=2.0; a*=0.5; }
  return s;
}

// ---------- spectral ----------
vec3 spectral(float nm){
  float P[12] = float[12](410.,440.,470.,490.,510.,530.,560.,580.,600.,625.,660.,690.);
  vec3 C[12] = vec3[12](
    vec3(0.42,0.00,0.80), vec3(0.10,0.00,1.00), vec3(0.00,0.28,1.00), vec3(0.00,0.72,0.95),
    vec3(0.00,0.95,0.42), vec3(0.08,1.00,0.08), vec3(0.55,1.00,0.00), vec3(1.00,0.92,0.00),
    vec3(1.00,0.52,0.00), vec3(1.00,0.22,0.00), vec3(1.00,0.03,0.00), vec3(0.85,0.00,0.00));
  float x = clamp(nm, P[0], P[11]);
  for(int i=0;i<11;i++){
    if(x <= P[i+1]){ float t=(x-P[i])/(P[i+1]-P[i]); return mix(C[i],C[i+1],t); }
  }
  return C[11];
}

// ---------- cabochon SDF (flattened ellipsoid) ----------
float sdfStone(vec3 p){
  vec3 r = vec3(1.0, 0.62, 1.0);
  float k0 = length(p/r);
  float k1 = length(p/(r*r));
  return k0*(k0-1.0)/k1;
}
vec3 nrm(vec3 p){
  vec2 e = vec2(0.0012, 0.0);
  return normalize(vec3(
    sdfStone(p+e.xyy)-sdfStone(p-e.xyy),
    sdfStone(p+e.yxy)-sdfStone(p-e.yxy),
    sdfStone(p+e.yyx)-sdfStone(p-e.yyx)));
}

// ---------- play-of-color (iter8 port: poc_volume6 + uniform/ribbon mix) ----------
vec3 poc(vec3 eye, vec3 p, vec3 n){
  vec3 v = normalize(eye - p);
  vec3 h = normalize(v + LIGHT);
  vec3 din = normalize(-v - n*0.30);
  float Fgrid = mix(5.0, 16.0, uDensity);  // DENSITY = number of flakes (placement grid) — independent of size
  float width = uPop;
  float tight = uHueSpread;
  float dstep = 0.015;
  vec3 acc = vec3(0.0); float trans = 1.0; float lust = 0.0;
  for(int i=0;i<16;i++){
    if(trans < 0.02) break;
    float depth = dstep*float(i);
    vec3 pt = p + din*depth;
    if(sdfStone(pt) > 0.003) break;
    float cov = smoothstep(0.30, 0.52, fbm(pt*2.1+vec3(12.0),3,0x77u)); // colour-bar vs potch gaps
    if(cov <= 0.01) continue;
    float bright = 0.7 + 0.5*fbm(pt*3.0+vec3(5.0),2,0x31u);
    V2 cell = voronoi2(pt*Fgrid + vec3(50.0), 0x0D1Fu);
    // FLAKE SIZE = absolute (world) footprint radius around each cell centre,
    // INDEPENDENT of the count grid; flakes may fill/overlap non-destructively.
    // The crisp inter-cell border keeps them distinct where they meet.
    float Rg = uSize * 0.05 * Fgrid * (0.6 + 0.8*cellUnit(cell.id ^ 0x71u)); // +per-flake size variety
    float foot = smoothstep(Rg, Rg - 0.16, cell.f1);          // blob of radius Rg (world-constant)
    float border = smoothstep(0.0, 0.05, cell.f2 - cell.f1);  // crisp inter-flake border
    float edge = foot * border;
    if(edge <= 0.01) continue;
    vec3 g0 = cellAxis(cell.id);
    vec3 g_used = g0;
    if(cellUnit(cell.id ^ 0x2Bu) < 0.32){ // ~1/3 ribbon flakes
      vec3 curlv = vec3(
        fbm(pt*7.0+vec3(1.3),2,0xC1u),
        fbm(pt*7.0+vec3(7.7),2,0xC2u),
        fbm(pt*7.0+vec3(3.1),2,0xC3u)) - 0.5;
      g_used = normalize(g0 + curlv*0.45);
    }
    float target = -0.1 + 0.9*cellUnit(cell.id ^ 0x09u);
    float q = (dot(h,g_used)-target)/width;
    float flash = exp(-q*q);
    if(flash < 0.025) continue;
    float hueC = (cellUnit(cell.id ^ 0x88u) < uHue2Mix) ? uHue2 : uHueCenter; // minority secondary-hue flakes
    float lambda = clamp(hueC + (cellUnit(cell.id^0x17u)-0.5)*tight + 10.0*(dot(h,g0)-target), 410.0, 690.0);
    float dbright = 0.5 + 0.9*cellUnit(cell.id^0x4Du);
    vec3 col = spectral(lambda) * (bright * flash * dbright);
    float opacity = clamp(edge*flash*cov, 0.0, 1.0)*0.9;
    acc += col * (trans*opacity);
    lust += flash*flash*flash*flash*flash*flash * (cov*edge);
    trans *= 1.0 - opacity;
  }
  acc *= mix(1.95, 0.7, uBody) * uBright * 2.6; // body tone (black pops, light washes) × brightness
  vec3 tint = (length(acc)>1e-4) ? normalize(acc) : vec3(1.0);
  vec3 sheen = (vec3(0.4)+tint*0.6) * (lust*0.6);
  vec3 o = acc + sheen;
  float luma = dot(o, vec3(0.3,0.59,0.11));
  return vec3(luma) + (o - vec3(luma))*1.5;
}

vec3 tonemap(vec3 c){
  c = (c*(2.51*c+0.03))/(c*(2.43*c+0.59)+0.14);
  return pow(clamp(c,0.0,1.0), vec3(1.0/2.2));
}

// ---------- matte sandstone skin / matrix (contrast to the gem) ----------
vec3 shadeSkin(vec3 pos, vec3 n){
  float h = fbm(pos*22.0, 3, 0x91u);                       // grain height
  vec3 bn = normalize(n + (vec3(
    fbm(pos*24.0+vec3(1.0),2,0x01u),
    fbm(pos*24.0+vec3(5.0),2,0x02u),
    fbm(pos*24.0+vec3(9.0),2,0x03u)) - 0.5) * 0.5);        // bumped normal
  vec3 alb = mix(vec3(0.20,0.16,0.11), vec3(0.46,0.37,0.26), fbm(pos*5.0,3,0x44u)); // sandstone tan
  alb *= mix(0.55, 1.05, h);                               // grain cavity
  float stain = smoothstep(0.55, 0.82, fbm(pos*9.0+vec3(3.0),3,0x66u));
  alb = mix(alb, vec3(0.34,0.17,0.08), stain*0.45);        // iron oxide pooling
  float diff = max(dot(bn, LIGHT), 0.0)*0.95 + 0.16;       // matte lambert + ambient
  return alb*diff;
}

void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - uRes)/uRes.y;
  float cp = cos(uPitch), sp = sin(uPitch);
  vec3 eye = uDist * vec3(cp*sin(uYaw), sp, cp*cos(uYaw));
  vec3 fwd = normalize(-eye);
  vec3 right = normalize(cross(fwd, vec3(0,1,0)));
  vec3 up = cross(right, fwd);
  vec3 rd = normalize(fwd + right*uv.x*0.5 + up*uv.y*0.5);

  // sphere-trace the cabochon
  float t=0.0; bool hit=false; vec3 pos=eye;
  for(int i=0;i<96;i++){
    pos = eye + rd*t;
    float d = sdfStone(pos);
    if(d < 0.0008){ hit=true; break; }
    t += d*0.8;
    if(t > 8.0) break;
  }

  vec3 col;
  if(hit){
    vec3 nn = nrm(pos);
    vec3 v = normalize(eye-pos);
    // matte sandstone skin over part of the rub (organic patches, more toward the
    // base) leaving a polished opal "window" — matte contrast to the gem.
    float skinMask = 0.0;
    if(uSkin > 0.001){
      float patches = fbm(pos*3.4 + vec3(20.0), 4, 0x55u);
      float lowbias = smoothstep(0.30, -0.30, pos.y);
      float m = patches*0.75 + lowbias*0.45;
      skinMask = step(0.80 - uSkin*0.55, m);
    }
    if(skinMask > 0.5){
      col = shadeSkin(pos, nn);
    } else {
      vec3 hh = normalize(v + LIGHT);
      vec3 fire = poc(eye, pos, nn);
      float spec = pow(max(dot(nn,hh),0.0), 220.0) * 0.8;        // wet polish highlight
      float fres = pow(1.0-max(dot(nn,v),0.0), 5.0);
      vec3 bodyCol = mix(vec3(0.014), vec3(0.60,0.59,0.58), uBody); // black backing → milky light body
      col = bodyCol + fire + vec3(spec) + vec3(0.05,0.06,0.09)*fres;
    }
  } else {
    float g = 0.5*rd.y+0.5;
    col = mix(vec3(0.018,0.018,0.022), vec3(0.05,0.05,0.062), g);
  }
  outColor = vec4(tonemap(col), 1.0);
}`;

const VERT = `#version 300 es
in vec2 p; void main(){ gl_Position = vec4(p,0.0,1.0); }`;

const cvs = document.getElementById('c');
const gl = cvs.getContext('webgl2', { antialias:false, preserveDrawingBuffer:false });
const errBox = document.getElementById('err');
function fail(msg){ errBox.style.display='block'; errBox.textContent = msg; console.error(msg); }
if(!gl){ fail('WebGL2 not available in this browser.'); }

function compile(type, src){
  const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){ fail('Shader compile error:\\n'+gl.getShaderInfoLog(s)); }
  return s;
}
let prog;
if(gl){
  prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
  gl.bindAttribLocation(prog, 0, 'p');
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){ fail('Link error:\\n'+gl.getProgramInfoLog(prog)); }
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  gl.useProgram(prog);
}
const U = n => gl.getUniformLocation(prog, n);
const loc = prog ? {
  res:U('uRes'), yaw:U('uYaw'), pitch:U('uPitch'), dist:U('uDist'),
  hue:U('uHueCenter'), spread:U('uHueSpread'), size:U('uSize'),
  dens:U('uDensity'), pop:U('uPop'), skin:U('uSkin'),
  body:U('uBody'), bright:U('uBright'), hue2:U('uHue2'), hue2mix:U('uHue2Mix')
} : {};

// ---------- state + controls ----------
const st = { yaw:0.5, pitch:0.62, dist:3.0, hue:445, spread:26, size:1.4, dens:0.6, pop:0.07, skin:0.0,
  body:0.05, bright:1.0, hue2:500, hue2mix:0.18, qual:1.0, spin:false };
let dragging=false, lastX=0, lastY=0;

cvs.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; cvs.setPointerCapture(e.pointerId); });
cvs.addEventListener('pointerup',   ()=>{ dragging=false; });
cvs.addEventListener('pointermove', e=>{
  if(!dragging) return;
  st.yaw   -= (e.clientX-lastX)*0.008;
  st.pitch += (e.clientY-lastY)*0.008;
  st.pitch = Math.max(-1.45, Math.min(1.45, st.pitch));
  lastX=e.clientX; lastY=e.clientY;
});
cvs.addEventListener('wheel', e=>{ e.preventDefault(); st.dist = Math.max(1.9, Math.min(5.5, st.dist + e.deltaY*0.002)); }, {passive:false});
// pinch zoom
let pinch=0;
cvs.addEventListener('touchmove', e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.hypot(dx,dy);
    if(pinch) st.dist = Math.max(1.9, Math.min(5.5, st.dist + (pinch-d)*0.01));
    pinch=d; e.preventDefault();
  }
}, {passive:false});
cvs.addEventListener('touchend', ()=>{ pinch=0; });

function bindSlider(id, key, fmt, valId){
  const el=document.getElementById(id), v=document.getElementById(valId);
  const upd=()=>{ st[key]=parseFloat(el.value); v.textContent=fmt(st[key]); };
  el.addEventListener('input', upd); upd();
}
bindSlider('hue','hue',x=>x.toFixed(0)+' nm','vHue');
bindSlider('spread','spread',x=>x.toFixed(0)+' nm','vSpread');
bindSlider('size','size',x=>x.toFixed(2)+'×','vSize');
bindSlider('dens','dens',x=>(x*100).toFixed(0)+'%','vDens');
bindSlider('pop','pop',x=>x.toFixed(3),'vPop');
bindSlider('skin','skin',x=>x<0.001?'off':(x*100).toFixed(0)+'%','vSkin');
bindSlider('body','body',x=>x<0.13?'black':x<0.45?'dark':x<0.66?'grey':'light','vBody');
bindSlider('bright','bright',x=>x.toFixed(2)+'×','vBright');
bindSlider('qual','qual',x=>x.toFixed(1)+'×','vQual');
document.querySelectorAll('.presets [data-hue]').forEach(b=>b.addEventListener('click',()=>{
  st.hue=+b.dataset.hue; st.spread=+b.dataset.spread;
  document.getElementById('hue').value=st.hue; document.getElementById('vHue').textContent=st.hue+' nm';
  document.getElementById('spread').value=st.spread; document.getElementById('vSpread').textContent=st.spread+' nm';
}));
const spinBtn=document.getElementById('spin');
spinBtn.addEventListener('click',()=>{ st.spin=!st.spin; spinBtn.classList.toggle('on',st.spin); });
document.getElementById('reset').addEventListener('click',()=>{ st.yaw=0.5; st.pitch=0.62; st.dist=3.0; });

// ---------- stone generator: seed -> correlated, cohesive opal identity ----------
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
function rng(seed){ let a=seed>>>0; return ()=>{ a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function hueName(nm){ return nm<466?'Blue':nm<494?'Teal':nm<548?'Green':nm<578?'Yellow':nm<600?'Gold':nm<625?'Orange':'Red'; }
function genStone(seed){
  const r=rng(seed);
  // body tone — weighted dark (Lightning Ridge black opal is the hero)
  let u=r(); let body = u<0.6 ? 0.02+0.10*r() : (u<0.85 ? 0.15+0.30*r() : 0.50+0.38*r());
  // brightness — brighter pops on darker bodies
  let bright = clamp((0.78+0.5*r())*(1.0-0.22*body), 0.45, 1.45);
  // dominant hue — blue/green common, yellow less, orange/red rare (& precious)
  let h=r(); let hue = h<0.34 ? 458+22*r() : h<0.62 ? 500+44*r() : h<0.80 ? 484+12*r() : h<0.92 ? 558+20*r() : 596+44*r();
  // secondary accent hue (a related but distinct colour)
  let hue2 = clamp(hue + (r()<0.5?-1:1)*(28+52*r()), 430, 655);
  let hue2mix = 0.08 + 0.26*r();
  // hue spread — tight (Australian) most of the time; occasionally wide
  let spread = r()<0.82 ? 18+22*r() : 60+95*r();
  // pattern -> size + density envelope
  let p=r(), size, dens, pat;
  if(p<0.34){ size=0.5+0.4*r(); dens=0.8+0.2*r();  pat='Pinfire'; }
  else if(p<0.62){ size=0.9+0.5*r(); dens=0.6+0.25*r(); pat='Fine'; }
  else if(p<0.85){ size=1.6+0.8*r(); dens=0.45+0.25*r(); pat='Harlequin'; }
  else { size=2.0+0.6*r(); dens=0.25+0.2*r(); pat='Broad flash'; }
  // pop — a touch sharper on brighter stones
  let pop = clamp(0.095 - 0.04*(bright-0.8) + 0.02*(r()-0.5), 0.045, 0.12);
  // skin — ~25% are rubs with some matrix skin
  let skin = r()<0.25 ? 0.2+0.3*r() : 0.0;
  const bn = body<0.13?'Black':body<0.45?'Dark':body<0.66?'Grey':'Crystal';
  const B = clamp(Math.round(1+bright*3),1,5);
  const sec = hue2mix>0.16 ? '/'+hueName(hue2) : '';
  const name = `${bn} · ${hueName(hue)}${sec} ${pat} · B${B}`;
  return {hue,hue2,hue2mix,spread,size,dens,pop,body,bright,skin,name,seed:seed>>>0};
}
function setS(id,val){ const el=document.getElementById(id); el.value=val; el.dispatchEvent(new Event('input')); }
function applyStone(s){
  setS('hue',s.hue.toFixed(0)); setS('spread',s.spread.toFixed(0));
  setS('size',s.size.toFixed(2)); setS('dens',s.dens.toFixed(2));
  setS('pop',s.pop.toFixed(3)); setS('skin',s.skin.toFixed(2));
  setS('body',s.body.toFixed(2)); setS('bright',s.bright.toFixed(2));
  st.hue2=s.hue2; st.hue2mix=s.hue2mix; // generator-only (no slider)
  document.getElementById('identity').textContent = s.name + '  ·  #' + s.seed.toString(16).padStart(8,'0');
}
document.getElementById('newstone').addEventListener('click',()=>{ applyStone(genStone((Math.random()*4294967295)>>>0)); });

// ---------- render loop ----------
function resize(){
  const q = st.qual * Math.min(window.devicePixelRatio||1, 2);
  const w = Math.floor(cvs.clientWidth * q), h = Math.floor(cvs.clientHeight * q);
  if(cvs.width!==w || cvs.height!==h){ cvs.width=w; cvs.height=h; }
}
let last=performance.now(), acc=0, frames=0, fpsEl=document.getElementById('fps'), tw=0;
function frame(now){
  if(!gl||!prog){ return; }
  const dt=(now-last)/1000; last=now;
  if(st.spin && !dragging){ st.yaw += dt*0.35; tw+=dt; st.pitch = 0.62 + 0.30*Math.sin(tw*1.1); }
  resize();
  gl.viewport(0,0,cvs.width,cvs.height);
  gl.uniform2f(loc.res, cvs.width, cvs.height);
  gl.uniform1f(loc.yaw, st.yaw); gl.uniform1f(loc.pitch, st.pitch); gl.uniform1f(loc.dist, st.dist);
  gl.uniform1f(loc.hue, st.hue); gl.uniform1f(loc.spread, st.spread);
  gl.uniform1f(loc.size, st.size); gl.uniform1f(loc.dens, st.dens);
  gl.uniform1f(loc.pop, st.pop); gl.uniform1f(loc.skin, st.skin);
  gl.uniform1f(loc.body, st.body); gl.uniform1f(loc.bright, st.bright);
  gl.uniform1f(loc.hue2, st.hue2); gl.uniform1f(loc.hue2mix, st.hue2mix);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  frames++; acc+=dt; if(acc>=0.5){ fpsEl.textContent=(frames/acc).toFixed(0)+' fps'; frames=0; acc=0; }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
