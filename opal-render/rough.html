<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Opal rough — composition + slice</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0a0a0c; color:#cfd2da; font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  canvas { width:100%; height:100%; display:block; touch-action:none; cursor:grab; } canvas:active { cursor:grabbing; }
  #ui { position:fixed; top:10px; left:10px; background:rgba(14,14,18,.85); border:1px solid #23262e; border-radius:10px; padding:11px 13px; width:236px; backdrop-filter:blur(6px); user-select:none; max-height:94vh; overflow:auto; }
  #ui h1 { font-size:12px; margin:0 0 8px; letter-spacing:.04em; color:#8fb6ff; text-transform:uppercase; }
  .sec { font-size:10px; letter-spacing:.08em; color:#697086; text-transform:uppercase; margin:11px 0 3px; }
  .row { display:flex; align-items:center; justify-content:space-between; margin:6px 0 2px; gap:8px; }
  .row label { color:#9aa0ac; } .row .val { color:#e6e9f0; font-variant-numeric:tabular-nums; min-width:56px; text-align:right; }
  input[type=range] { width:100%; accent-color:#6f9bff; margin:0; }
  #newrough { width:100%; margin-bottom:6px; padding:8px; font-size:12px; background:#2c3c63; border:1px solid #3f5da0; color:#dce6ff; border-radius:7px; cursor:pointer; }
  #newrough:hover { background:#34457a; }
  #identity { font-size:11px; color:#9fb4e0; margin-bottom:4px; min-height:14px; }
  #stack { font-size:10px; color:#7f8696; margin-bottom:6px; font-family:ui-monospace,Menlo,monospace; }
  #err { position:fixed; inset:auto 10px 10px 10px; max-height:42%; overflow:auto; background:#2a1316; border:1px solid #6b2630; color:#ffb4ba; padding:10px; border-radius:8px; font:11px/1.4 ui-monospace,Menlo,monospace; white-space:pre-wrap; display:none; }
  #hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); color:#6b7280; background:rgba(14,14,18,.6); padding:5px 12px; border-radius:8px; }
  #fps { position:fixed; top:10px; right:12px; color:#5a6172; font-variant-numeric:tabular-nums; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>Opal rough · slice</h1>
  <button id="newrough">🎲 New rough</button>
  <div id="identity">drag to rotate · slice below</div>
  <div id="stack"></div>
  <div class="sec">Cut</div>
  <div class="row"><label>Slice depth</label><span class="val" id="vSlice">0.05</span></div>
  <input type="range" id="slice" min="-1.2" max="1.2" step="0.01" value="0.05">
  <div class="sec">Layers</div>
  <div class="row"><label>Margin movement</label><span class="val" id="vMarg">0.08</span></div>
  <input type="range" id="marg" min="0.0" max="0.32" step="0.01" value="0.14">
  <div class="row"><label>Marble ↔ layered</label><span class="val" id="vMarble">0%</span></div>
  <input type="range" id="marble" min="0.0" max="1.0" step="0.05" value="0.0">
  <div class="row"><label>Tilt</label><span class="val" id="vTilt">0.10</span></div>
  <input type="range" id="tilt" min="-0.6" max="0.6" step="0.02" value="0.10">
  <div class="row"><label>Bar edge</label><span class="val" id="vSharp">soft</span></div>
  <input type="range" id="sharp" min="0.04" max="0.30" step="0.01" value="0.12">
  <div class="row"><label>Tone shift</label><span class="val" id="vTsh">0.00</span></div>
  <input type="range" id="tsh" min="-0.25" max="0.35" step="0.01" value="0.0">
  <div class="row"><label>Matrix</label><span class="val" id="vMatrix">healthy</span></div>
  <input type="range" id="matrix" min="0.0" max="0.45" step="0.02" value="0.06">
  <div class="sec">Play-of-color</div>
  <div class="row"><label>Hue</label><span class="val" id="vHue">470 nm</span></div>
  <input type="range" id="hue" min="430" max="660" step="1" value="470">
  <div class="row"><label>Flake size</label><span class="val" id="vSize">1.30×</span></div>
  <input type="range" id="size" min="0.4" max="2.6" step="0.05" value="1.3">
  <div class="row"><label>Density</label><span class="val" id="vDens">70%</span></div>
  <input type="range" id="dens" min="0.2" max="1.0" step="0.05" value="0.7">
</div>
<div id="fps"></div>
<div id="hint">drag to rotate · slice through to read the rough</div>
<div id="err"></div>

<script>
const FRAG=`#version 300 es
precision highp float; precision highp int;
out vec4 outColor;
uniform vec2 uRes; uniform float uYaw,uPitch,uDist,uSlice;
uniform vec3 uRadii; uniform float uLump,uPlaneK; uniform int uNP; uniform vec4 uPlane[6];
uniform float uTilt,uMargAmp,uMargF,uToneShift,uBarSharp,uMatrix,uCrackD,uMarble,uSwirl,uSwirlF;
uniform int uNL; uniform float uBnd[8]; uniform int uTy[7]; uniform float uTo[7];
uniform float uHue,uHue2,uHue2Mix,uSpread,uSize,uDens,uPop,uBright;

const vec3 LIGHT=vec3(0.6246,0.6246,0.4690);
const vec3 SLICEN=vec3(1.0,0.0,0.0);
const vec3 BHAT=vec3(0.0855,0.9926,0.0855);

uint hashU(uint x){ x^=x>>16; x*=0x7feb352du; x^=x>>15; x*=0x846ca68bu; x^=x>>16; return x; }
uint hash3(ivec3 c,uint s){ uint h=s*0x9E3779B1u; h^=hashU(uint(c.x)*0x85ebca6bu); h^=hashU(uint(c.y)*0xc2b2ae35u); h^=hashU(uint(c.z)*0x27d4eb2fu); return hashU(h); }
float u2u(uint h){ return float(h&0x00FFFFFFu)/16777216.0; }
float cellUnit(uint id){ return u2u(hashU(id^0x9e3779b9u)); }
vec3 cellAxis(uint id){ float a=u2u(id)*6.2831853; float z=u2u(hashU(id))*2.0-1.0; float r=sqrt(max(0.0,1.0-z*z)); return vec3(r*cos(a),r*sin(a),z); }
vec3 cellJit(uint h){ return vec3(u2u(h),u2u(hashU(h)),u2u(hashU(hashU(h)))); }
struct V2 { uint id; float f1; float f2; };
V2 vor2(vec3 p,uint s){ vec3 pf=floor(p); float f1=1e9,f2=1e9; uint id=0u;
  for(int dz=-1;dz<=1;dz++)for(int dy=-1;dy<=1;dy++)for(int dx=-1;dx<=1;dx++){
    ivec3 c=ivec3(pf)+ivec3(dx,dy,dz); uint h=hash3(c,s); vec3 fp=vec3(c)+cellJit(h);
    float d=length(fp-p); if(d<f1){f2=f1;f1=d;id=h;} else if(d<f2){f2=d;} } return V2(id,f1,f2); }
float vh(ivec3 c,uint s){ return u2u(hash3(c,s)); }
float vnoise(vec3 p,uint s){ vec3 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f); ivec3 b=ivec3(i);
  return mix(mix(mix(vh(b,s),vh(b+ivec3(1,0,0),s),u.x),mix(vh(b+ivec3(0,1,0),s),vh(b+ivec3(1,1,0),s),u.x),u.y),
             mix(mix(vh(b+ivec3(0,0,1),s),vh(b+ivec3(1,0,1),s),u.x),mix(vh(b+ivec3(0,1,1),s),vh(b+ivec3(1,1,1),s),u.x),u.y),u.z); }
float fbm(vec3 p,int o,uint s){ float a=0.5,v=0.0; for(int i=0;i<6;i++){ if(i>=o)break; v+=a*vnoise(p,s+uint(i)*131u); p*=2.0; a*=0.5; } return v; }
vec3 spectral(float nm){ float P[12]=float[12](410.,440.,470.,490.,510.,530.,560.,580.,600.,625.,660.,690.);
  vec3 C[12]=vec3[12](vec3(.42,0.,.8),vec3(.1,0.,1.),vec3(0.,.28,1.),vec3(0.,.72,.95),vec3(0.,.95,.42),vec3(.08,1.,.08),
    vec3(.55,1.,0.),vec3(1.,.92,0.),vec3(1.,.52,0.),vec3(1.,.22,0.),vec3(1.,.03,0.),vec3(.85,0.,0.));
  float x=clamp(nm,P[0],P[11]); for(int i=0;i<11;i++){ if(x<=P[i+1]) return mix(C[i],C[i+1],(x-P[i])/(P[i+1]-P[i])); } return C[11]; }
vec3 tonemap(vec3 c){ c=(c*(2.51*c+0.03))/(c*(2.43*c+0.59)+0.14); return pow(clamp(c,0.0,1.0),vec3(1.0/2.2)); }
float smax(float a,float b,float k){ float h=clamp(0.5+0.5*(a-b)/k,0.0,1.0); return mix(b,a,h)+k*h*(1.0-h); }

// ---------- form: nobby / angular fragment / seam ----------
float sdStone(vec3 p){
  vec3 q=p/uRadii; float d=(length(q)-1.0)*0.7;
  d += uLump*fbm(p*1.8+vec3(2.0),3,0x10u) - uLump*0.5;
  for(int i=0;i<6;i++){ if(i>=uNP) break; d = smax(d, dot(p,uPlane[i].xyz)-uPlane[i].w, uPlaneK); }
  return d;
}
vec3 gradStone(vec3 p){ vec2 e=vec2(0.0016,0.0); return normalize(vec3(
  sdStone(p+e.xyy)-sdStone(p-e.xyy),sdStone(p+e.yxy)-sdStone(p-e.yxy),sdStone(p+e.yyx)-sdStone(p-e.yyx))); }

// ---------- the region stack: EVERY margin moves (like the bar) ----------
vec3 latOf(vec3 p){ return p-BHAT*dot(p,BHAT); }
// structure coordinate: blends bedding (layered) <-> domain-warped blobs (marbled/swirly)
float structF(vec3 p){
  vec3 wp = p + uSwirl*(vec3(fbm(p*uSwirlF+vec3(1.),3,0xA1u),fbm(p*uSwirlF+vec3(9.),3,0xA2u),fbm(p*uSwirlF+vec3(5.),3,0xA3u))-0.5);
  float bed = clamp((dot(wp,BHAT)+uTilt*latOf(wp).x)*0.55+0.5, 0.0, 1.0); // layered
  float blob = fbm(wp*1.7+vec3(20.),4,0x44u);                            // marbled
  return mix(bed, blob, uMarble);
}
struct Reg { int ty; float tone; };  // ty: 0 sandstone · 1 potch · 2 color bar
Reg regionAt(vec3 p){
  float w = structF(p); int k=0;                                         // structure-space, ~[0,1]
  for(int i=0;i<7;i++){ if(i>=uNL) break;
    float b = uBnd[i] + uMargAmp*(fbm(p*uMargF+vec3(float(i)*17.3),3,0x21u)-0.5); // per-margin undulation
    if(w >= b) k=i; }
  return Reg(uTy[k], clamp(uTo[k]+uToneShift, 0.0, 0.97));
}
float crackDist(vec3 p){ if(uCrackD>5.0) return 9.0; return abs(dot(p,normalize(vec3(0.25,0.35,1.0)))-uCrackD+0.16*fbm(p*2.0+vec3(40.0),2,0x99u)); }

// additively-weighted Voronoi (Keio) -> domains of VARIED size, not a uniform grid
V2 vor2w(vec3 p,uint s){ vec3 pf=floor(p); float f1=1e9,f2=1e9; uint id=0u;
  for(int dz=-1;dz<=1;dz++)for(int dy=-1;dy<=1;dy++)for(int dx=-1;dx<=1;dx++){
    ivec3 c=ivec3(pf)+ivec3(dx,dy,dz); uint hh=hash3(c,s); vec3 fp=vec3(c)+cellJit(hh);
    float d=length(fp-p)-0.34*u2u(hh^0x55u);     // additive weight -> bigger/smaller domains
    if(d<f1){f2=f1;f1=d;id=hh;} else if(d<f2){f2=d;} } return V2(id,f1,f2); }

// internal-volume diffraction, Keio-leaning (the SHARED play-of-color core):
//   weighted-Voronoi domains + PERCOLATION clusters that flash coherently (some dead potch)
//   + Bragg/Ewald coupling (a cluster's lattice spacing -> its hue; angle <-> on/off <-> wavelength
//   co-vary). 16-step depth-composited march. Backing tone = the adjoining potch (not pegged black).
vec3 barFire(vec3 p, vec3 fN, vec3 eye, float tone){
  vec3 v=normalize(eye-p),h=normalize(v+LIGHT),din=normalize(-v-fN*0.30);
  float Fg=mix(5.0,16.0,uDens); vec3 acc=vec3(0.0); float tr=1.0,lust=0.0;
  for(int i=0;i<16;i++){ if(tr<0.02) break; vec3 pt=p+din*(0.015*float(i));
    if(sdStone(pt)>0.003) break; if(regionAt(pt).ty!=2) continue;
    float cov=smoothstep(0.20,0.50,fbm(pt*2.1+vec3(12.0),3,0x77u)); if(cov<=0.01) continue; // ordered vs dead potch
    float bright=0.7+0.5*fbm(pt*3.0+vec3(5.0),2,0x31u);
    // PERCOLATION CLUSTER: coarse connected domain sharing a lattice -> flashes as one
    V2 cl=vor2(pt*(Fg*0.42)+vec3(80.0),0x0C1Au);
    if(cellUnit(cl.id^0x5Du) > mix(0.55,1.0,uDens)) continue;  // some clusters are common potch
    vec3 gC=cellAxis(cl.id); float dC=cellUnit(cl.id^0x33u);   // cluster lattice normal + sphere-size
    // FINE FLAKE (weighted) -> crisp varied borders inside the cluster
    V2 cell=vor2w(pt*Fg+vec3(50.0),0x0D1Fu);
    float Rg=uSize*0.05*Fg*(0.55+0.9*cellUnit(cell.id^0x71u));
    float edge=smoothstep(Rg,Rg-0.16,cell.f1)*smoothstep(0.0,0.05,cell.f2-cell.f1); if(edge<=0.01) continue;
    vec3 g0=normalize(gC+(cellAxis(cell.id)-gC)*0.25); vec3 gu=g0; // cluster-coherent + slight per-flake jitter
    if(cellUnit(cell.id^0x2Bu)<0.30){ vec3 cu=vec3(fbm(pt*7.0+vec3(1.3),2,0xC1u),fbm(pt*7.0+vec3(7.7),2,0xC2u),fbm(pt*7.0+vec3(3.1),2,0xC3u))-0.5; gu=normalize(g0+cu*0.45); }
    float target=-0.05+0.85*dC;                               // Bragg angle from sphere size (Ewald)
    float q=(dot(h,gu)-target)/uPop; float fl=exp(-q*q); if(fl<0.02) continue;
    float baseHue=uHue+(dC-0.5)*uSpread*1.6;                  // sphere size -> base hue (cohesive family)
    if(cellUnit(cell.id^0x88u)<uHue2Mix) baseHue=uHue2;       // minority secondary-hue flakes
    float lam=clamp(baseHue+120.0*(dot(h,g0)-target),410.0,690.0); // angle -> wavelength (co-varies)
    float db=0.5+0.9*cellUnit(cell.id^0x4Du); vec3 col=spectral(lam)*(bright*fl*db);
    float op=clamp(edge*fl*cov,0.0,1.0)*0.9; acc+=col*(tr*op);
    lust+=fl*fl*fl*fl*fl*fl*(cov*edge); tr*=1.0-op; }
  acc*=mix(1.95,0.7,tone)*uBright*2.6; vec3 tint=(length(acc)>1e-4)?normalize(acc):vec3(1.0);
  vec3 sheen=(vec3(0.4)+tint*0.6)*(lust*0.6); vec3 o=acc+sheen;
  float luma=dot(o,vec3(0.3,0.59,0.11)); return vec3(luma)+(o-vec3(luma))*1.5;
}
// waxy potch — tone = this region's body tone (distinct per layer)
vec3 potchShade(vec3 p, vec3 n, vec3 eye, float tone){
  vec3 base=mix(vec3(0.02,0.02,0.026),vec3(0.60,0.61,0.58),tone)*vec3(0.96,1.0,0.93);
  if(fbm(p*2.6+vec3(30.0),3,0x33u)>1.0-uMatrix) base=mix(base,vec3(0.17,0.12,0.09),0.5);
  vec3 v=normalize(eye-p),h=normalize(v+LIGHT); float wax=pow(max(dot(n,h),0.0),26.0)*0.4;
  return base*(max(dot(n,LIGHT),0.0)*0.8+0.2)+vec3(wax)*vec3(0.96,0.99,0.9);
}
// thick, textured, dry matte sandstone (cream/tan/brown/dark + sub-banding) — the ONLY hard material
vec3 sandstoneShade(vec3 p, vec3 n){
  float macro=fbm(p*4.0,4,0x44u);                                   // big mottle
  float band=fbm(p*vec3(2.5,8.0,2.5)+vec3(11.0),3,0x12u);           // sub-layer banding
  float grain=fbm(p*36.0,3,0x91u);                                  // fine grain
  vec3 alb=mix(vec3(0.60,0.55,0.45),vec3(0.40,0.32,0.22),macro);    // buff -> tan
  alb=mix(alb,vec3(0.50,0.41,0.28), smoothstep(0.42,0.70,band)*0.5);// banding tint
  alb=mix(alb,vec3(0.27,0.18,0.11), smoothstep(0.55,0.80,fbm(p*7.0+vec3(20.0),3,0x66u))*0.65); // brown patches
  alb=mix(alb,vec3(0.09,0.08,0.07), smoothstep(0.82,0.92,fbm(p*13.0+vec3(5.0),2,0x77u))*0.6);  // dark crust spots
  alb*=mix(0.60,1.06,grain);                                        // grain light/dark
  alb*=mix(0.70,1.0,macro);                                         // crevice darkening (AO-ish)
  vec3 bn=normalize(n+(vec3(fbm(p*30.0+vec3(1.),2,0x1u),fbm(p*30.0+vec3(5.),2,0x2u),fbm(p*30.0+vec3(9.),2,0x3u))-0.5)*0.6); // strong micro-bump
  float nl=max(dot(bn,LIGHT),0.0);
  return alb*(nl*0.80+0.16);                                        // matte, dry — no sheen
}
// the cut cross-section
vec3 crossSection(vec3 p, vec3 fN, vec3 eye){
  if(crackDist(p)<0.012) return vec3(0.015);
  Reg R=regionAt(p);
  if(R.ty==0) return sandstoneShade(p,fN);                       // distinct, hard
  vec3 base=potchShade(p,fN,eye,R.tone);                         // waxy potch of this layer's tone
  if(R.ty==2){ // bar region: potch backing shows through; fire is additive on top (dead spots = bare potch)
    vec3 f=barFire(p,fN,eye,R.tone);
    vec3 v=normalize(eye-p),h=normalize(v+LIGHT); float sp=pow(max(dot(fN,h),0.0),120.0)*0.5; // wet polish
    return base + f + vec3(sp); }
  return base;
}
// exterior = whatever layer reaches the surface (no separate skin), lightly weathered
vec3 shadeExt(vec3 p, vec3 n, vec3 eye){
  return crossSection(p, n, eye);   // surface shows its TRUE material — opal/bar at the surface shows (don't paint over)
}

void main(){
  vec2 uv=(gl_FragCoord.xy*2.0-uRes)/uRes.y;
  float cp=cos(uPitch),sp=sin(uPitch); vec3 eye=uDist*vec3(cp*sin(uYaw),sp,cp*cos(uYaw));
  vec3 fwd=normalize(-eye),right=normalize(cross(fwd,vec3(0,1,0))),up=cross(right,fwd);
  vec3 rd=normalize(fwd+right*uv.x*0.55+up*uv.y*0.55);
  float t=0.0; bool hit=false; vec3 pos=eye;
  for(int i=0;i<140;i++){ pos=eye+rd*t; float d=max(sdStone(pos),dot(pos,SLICEN)-uSlice);
    if(d<0.0008){ hit=true; break; } t+=d*0.7; if(t>9.0) break; }
  vec3 col;
  if(hit){ float dS=sdStone(pos),dP=dot(pos,SLICEN)-uSlice;
    if(dP>dS-0.0015) col=crossSection(pos,SLICEN,eye); else col=shadeExt(pos,gradStone(pos),eye); }
  else { float g=0.5*rd.y+0.5; col=mix(vec3(0.018,0.018,0.022),vec3(0.05,0.05,0.062),g); }
  outColor=vec4(tonemap(col),1.0);
}`;
const VERT=`#version 300 es
in vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;

const cvs=document.getElementById('c'),gl=cvs.getContext('webgl2',{antialias:false}),errBox=document.getElementById('err');
function fail(m){ errBox.style.display='block'; errBox.textContent=m; console.error(m); }
if(!gl) fail('WebGL2 not available.');
function compile(t,s){ const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) fail('Shader error:\\n'+gl.getShaderInfoLog(sh)); return sh; }
let prog;
if(gl){ prog=gl.createProgram(); gl.attachShader(prog,compile(gl.VERTEX_SHADER,VERT)); gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FRAG));
  gl.bindAttribLocation(prog,0,'p'); gl.linkProgram(prog); if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) fail('Link error:\\n'+gl.getProgramInfoLog(prog));
  const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0); gl.useProgram(prog); }
const U=n=>gl.getUniformLocation(prog,n);
const F=['uYaw','uPitch','uDist','uSlice','uLump','uPlaneK','uTilt','uMargAmp','uMargF','uToneShift','uBarSharp','uMatrix','uCrackD','uMarble','uSwirl','uSwirlF','uHue','uHue2','uHue2Mix','uSpread','uSize','uDens','uPop','uBright'];
const loc={}; if(prog){ ['uRes','uRadii','uNP','uPlane','uNL','uBnd','uTy','uTo'].concat(F).forEach(n=>loc[n]=U(n)); }
const FK={uYaw:'yaw',uPitch:'pitch',uDist:'dist',uSlice:'slice',uLump:'lump',uPlaneK:'planeK',uTilt:'tilt',uMargAmp:'margAmp',uMargF:'margF',uToneShift:'toneShift',uBarSharp:'barSharp',uMatrix:'matrix',uCrackD:'crackD',uMarble:'marble',uSwirl:'swirl',uSwirlF:'swirlF',uHue:'hue',uHue2:'hue2',uHue2Mix:'hue2mix',uSpread:'spread',uSize:'size',uDens:'dens',uPop:'pop',uBright:'bright'};

const st={ yaw:1.55,pitch:0.22,dist:3.3,slice:0.05,
  radii:[1,0.62,1], lump:0.12, np:0, plane:new Float32Array(24), planeK:0.05,
  tilt:0.10, margAmp:0.08, margF:2.2, toneShift:0.0, barSharp:0.12, matrix:0.06, crackD:9.0, marble:0.0, swirl:0.35, swirlF:1.4,
  NL:5, bnd:new Float32Array(8), ty:new Int32Array(7), to:new Float32Array(7),
  hue:470, hue2:505, hue2mix:0.18, spread:26, size:1.3, dens:0.7, pop:0.07, bright:1.05, qual:1.0 };

let drag=false,lx=0,ly=0;
cvs.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;cvs.setPointerCapture(e.pointerId);});
cvs.addEventListener('pointerup',()=>drag=false);
cvs.addEventListener('pointermove',e=>{ if(!drag)return; st.yaw-=(e.clientX-lx)*0.008; st.pitch=Math.max(-1.45,Math.min(1.45,st.pitch+(e.clientY-ly)*0.008)); lx=e.clientX; ly=e.clientY; });
cvs.addEventListener('wheel',e=>{e.preventDefault(); st.dist=Math.max(2.0,Math.min(6.0,st.dist+e.deltaY*0.002));},{passive:false});

function bind(id,key,fmt,vid){ const el=document.getElementById(id),v=document.getElementById(vid); const f=()=>{ st[key]=parseFloat(el.value); v.textContent=fmt(st[key]); }; el.addEventListener('input',f); f(); }
bind('slice','slice',x=>x.toFixed(2),'vSlice');
bind('marg','margAmp',x=>x.toFixed(2),'vMarg');
bind('marble','marble',x=>(x*100).toFixed(0)+'%','vMarble');
bind('tilt','tilt',x=>x.toFixed(2),'vTilt');
bind('sharp','barSharp',x=>x<0.09?'sharp':x<0.18?'soft':'graded','vSharp');
bind('tsh','toneShift',x=>x.toFixed(2),'vTsh');
bind('matrix','matrix',x=>x<0.05?'healthy':x<0.2?'some matrix':'unhealthy','vMatrix');
bind('hue','hue',x=>x.toFixed(0)+' nm','vHue');
bind('size','size',x=>x.toFixed(2)+'×','vSize');
bind('dens','dens',x=>(x*100).toFixed(0)+'%','vDens');

const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
function rng(s){ let a=s>>>0; return ()=>{ a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function hueName(nm){ return nm<466?'Blue':nm<494?'Teal':nm<548?'Green':nm<578?'Yellow':nm<600?'Gold':nm<625?'Orange':'Red'; }
function genRough(seed){
  const r=rng(seed);
  // FORM population
  let pp=r(), form, plane=new Float32Array(24), np=0, radii, lump, planeK;
  if(pp<0.5){ form='Fragment'; np=4+Math.floor(r()*3); radii=[0.85+0.3*r(),0.6+0.35*r(),0.85+0.3*r()]; lump=0.04+0.04*r(); planeK=0.03+0.04*r();
    for(let i=0;i<np;i++){ let a=r()*6.283,z=r()*2-1,rr=Math.sqrt(Math.max(0,1-z*z)); plane[i*4]=rr*Math.cos(a); plane[i*4+1]=z; plane[i*4+2]=rr*Math.sin(a); plane[i*4+3]=0.35+0.42*r(); } }
  else if(pp<0.84){ form='Nobby'; np=0; radii=[1.0,0.58+0.22*r(),1.0]; lump=0.10+0.07*r(); planeK=0.05; }
  else { form='Seam'; np=2; radii=[1.1,0.32+0.12*r(),1.0]; lump=0.03+0.03*r(); planeK=0.05;
    plane[0]=0;plane[1]=1;plane[2]=0;plane[3]=radii[1]*0.7; plane[4]=0;plane[5]=-1;plane[6]=0;plane[7]=radii[1]*0.7; }
  // STYLE: mostly layered (seam, sandstone); marbled is occasional
  let types=[], widths=[], tones=[]; const add=(t,w,to)=>{ types.push(t); widths.push(w); tones.push(to); };
  let marble, swirl, swirlF, hasBar=true, styleName;
  // body/backing tone — VARIED (black common, but grey & crystal/light too); the bar's backing comes from this
  let u=r(); let backing = u<0.5 ? 0.03+0.10*r() : (u<0.8 ? 0.16+0.26*r() : 0.50+0.32*r());
  let light = clamp(backing+0.24+0.26*r(), 0.05, 0.85);           // a distinctly different potch tone
  if(r()<0.82){
    styleName='Layered'; marble=0.04+0.22*r(); swirl=0.12+0.22*r(); swirlF=1.2+1.0*r();
    hasBar=r()<0.90;
    add(0,0.22+0.26*r(),0);                                        // bottom sandstone (common outer volume)
    if(r()<0.25) add(0,0.07+0.11*r(),0);                          // a sandstone run through
    add(1,0.16+0.26*r(),backing);                                  // backing potch
    if(r()<0.45) add(1,0.10+0.16*r(),clamp(backing+0.18+0.14*r(),0,0.8)); // 2nd potch tone
    if(hasBar) add(2,0.07+0.10*r(), clamp(backing+0.06*(r()-0.5),0,0.85)); // bar — backing from the adjoining potch
    add(1,0.10+0.18*r(),light);                                    // different potch tone above
    add(0,0.26+0.30*r(),0);                                        // THICK top sandstone (always)
  } else {
    styleName='Marbled'; marble=0.6+0.4*r(); swirl=0.35+0.40*r(); swirlF=1.0+1.2*r();
    let nreg=5+Math.floor(r()*2); hasBar=false;
    for(let k=0;k<nreg;k++){
      if(k>0 && k<nreg-1 && r()<0.34){ add(2,0.06+0.08*r(), backing); hasBar=true; }  // bar patch (neighbour backing)
      else { let t=(k%2===0)?(0.03+0.12*r()):(r()<0.5?0.84+0.12*r():0.40+0.18*r()); add(1,0.10+0.20*r(),t); }
    }
    if(r()<0.6) add(0,0.16+0.22*r(),0);                            // usually some sandstone too
  }
  while(types.length>7){ types.splice(1,1); widths.splice(1,1); tones.splice(1,1); }
  let nl=types.length;
  // boundaries in structure-space [0,1]
  let sum=widths.reduce((a,b)=>a+b,0), sc=1.0/sum, bnd=new Float32Array(8); let accm=0.0; bnd[0]=0.0;
  for(let i=0;i<nl;i++){ accm+=widths[i]*sc; bnd[i+1]=accm; }
  let Ty=new Int32Array(7), To=new Float32Array(7);
  for(let i=0;i<nl;i++){ Ty[i]=types[i]; To[i]=tones[i]; }
  // bedding + margin movement + defects
  let tilt=(r()-0.5)*0.45, margAmp=0.09+0.15*r(), margF=1.6+1.6*r();   // higher undulation default
  let matrix=r()<0.5?0.02+0.06*r():0.12+0.28*r();
  let crackD=r()<0.28?(-0.4+0.8*r()):9.0;
  let barSharp=0.05+0.16*r();
  // PLAY-OF-COLOR
  let h=r(); let hue=h<0.34?458+22*r():h<0.62?500+44*r():h<0.80?484+12*r():h<0.92?558+20*r():596+44*r();
  let hue2=clamp(hue+(r()<0.5?-1:1)*(28+52*r()),430,655), hue2mix=0.08+0.26*r();
  let spread=r()<0.82?18+22*r():60+90*r();
  let pc=r(),size,dens,pat; if(pc<0.34){size=0.5+0.4*r();dens=0.86+0.14*r();pat='Pinfire';}      // denser fire overall
  else if(pc<0.62){size=0.9+0.5*r();dens=0.72+0.2*r();pat='Fine';}
  else if(pc<0.85){size=1.5+0.8*r();dens=0.6+0.25*r();pat='Harlequin';} else {size=1.9+0.6*r();dens=0.45+0.22*r();pat='Broad';}
  let bright=clamp((0.85+0.45*r())*(1.0-0.18*backing),0.55,1.45);
  let pop=clamp(0.095-0.04*(bright-0.8)+0.02*(r()-0.5),0.045,0.12);
  Object.assign(st,{radii,lump,np,plane,planeK,NL:nl,bnd,ty:Ty,to:To,tilt,margAmp,margF,marble,swirl,swirlF,matrix,crackD,barSharp,hue,hue2,hue2mix,spread,size,dens,pop,bright});
  const setS=(id,v)=>{const el=document.getElementById(id); el.value=v; el.dispatchEvent(new Event('input'));};
  setS('marg',margAmp.toFixed(2)); setS('marble',marble.toFixed(2)); setS('tilt',tilt.toFixed(2)); setS('sharp',barSharp.toFixed(2));
  setS('matrix',matrix.toFixed(2)); setS('hue',hue.toFixed(0)); setS('size',size.toFixed(2)); setS('dens',dens.toFixed(2));
  const nN=t=>t<0.13?'N2':t<0.30?'N4':t<0.5?'N6':'N8';
  document.getElementById('identity').textContent=`${form} · ${styleName} · ${hueName(hue)} ${pat}${hasBar?'':' · barren'}${crackD<5?' · ⚠crack':''}`;
  document.getElementById('stack').textContent='top↓ '+types.slice().reverse().map((t,i)=>{let j=nl-1-i; return t===0?'sand':t===2?'BAR':nN(To[j]);}).join(' · ');
}
document.getElementById('newrough').addEventListener('click',()=>genRough((Math.random()*4294967295)>>>0));

function resize(){ const q=st.qual*Math.min(window.devicePixelRatio||1,2); const w=Math.floor(cvs.clientWidth*q),h=Math.floor(cvs.clientHeight*q); if(cvs.width!==w||cvs.height!==h){cvs.width=w;cvs.height=h;} }
let last=performance.now(),fa=0,fr=0,fpsEl=document.getElementById('fps');
function frame(now){ if(!gl||!prog) return; const dt=(now-last)/1000; last=now; resize(); gl.viewport(0,0,cvs.width,cvs.height);
  gl.uniform2f(loc.uRes,cvs.width,cvs.height); gl.uniform3f(loc.uRadii,st.radii[0],st.radii[1],st.radii[2]); gl.uniform1i(loc.uNP,st.np); gl.uniform4fv(loc.uPlane,st.plane);
  gl.uniform1i(loc.uNL,st.NL); gl.uniform1fv(loc.uBnd,st.bnd); gl.uniform1iv(loc.uTy,st.ty); gl.uniform1fv(loc.uTo,st.to);
  for(const k of F) gl.uniform1f(loc[k], st[FK[k]]);
  gl.drawArrays(gl.TRIANGLES,0,3); fr++; fa+=dt; if(fa>=0.5){ fpsEl.textContent=(fr/fa).toFixed(0)+' fps'; fr=0; fa=0; } requestAnimationFrame(frame); }
genRough(0x5EED1);
requestAnimationFrame(frame);
</script>
</body>
